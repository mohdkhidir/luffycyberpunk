<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyberpunk Game — Landing Page Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Yuji+Mai&family=Shippori+Mincho:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0c0d0f; --panel:#15171a; --panel2:#1b1e22;
    --line:#2c3036; --line2:#3a4048;
    --ink:#e8eaed; --muted:#868d96; --muted2:#5b626b;
    --blood:#c5151c; --blood-ink:#fff;
    --title-font:"Yuji Mai", serif;
    --scrim:0.55;
    --mono:"Space Mono", ui-monospace, Menlo, monospace;
    --sans:"Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:#0a0b0c; font-family:var(--sans); }

  /* ===== PAGE SHELL ===== */
  .wf-page {
    width:100%; height:100%; background:var(--bg); color:var(--ink);
    font-family:var(--sans); position:relative; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== ANNOTATIONS (wireframe tags) ===== */
  .wf-zone-tag {
    display:inline-block; font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--blood); border:1px dashed color-mix(in oklab, var(--blood) 55%, transparent);
    padding:4px 9px; border-radius:2px; margin-bottom:18px; background:color-mix(in oklab, var(--blood) 8%, transparent);
  }
  .wf-no-annot .wf-zone-tag, .wf-no-annot .wf-slot__tag { display:none; }

  /* ===== PLACEHOLDER SLOTS ===== */
  .wf-slot {
    position:relative; display:flex; align-items:center; justify-content:center;
    background:
      repeating-linear-gradient(135deg, #181b1e 0 11px, #141619 11px 22px);
    border:1px dashed var(--line2); border-radius:3px; overflow:hidden;
  }
  .wf-slot--dark {
    background:
      repeating-linear-gradient(135deg, #121417 0 14px, #0e1013 14px 28px);
  }
  .wf-slot__tag {
    font-family:var(--mono); font-size:11px; letter-spacing:1px; color:var(--muted);
    text-transform:uppercase; background:rgba(8,9,10,.7); border:1px solid var(--line);
    padding:5px 10px; border-radius:2px; max-width:80%; text-align:center;
  }

  /* ===== GREY TEXT LINES (mid-fi body copy) ===== */
  .wf-line { height:9px; border-radius:2px; background:var(--panel2); margin:9px 0; }
  .wf-line--90 { width:90%; } .wf-line--80 { width:80%; } .wf-line--70 { width:70%; }
  .wf-line--60 { width:60%; } .wf-line--50 { width:50%; } .wf-line--40 { width:40%; }

  /* ===== NAV ===== */
  .wf-nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:26px 56px; z-index:5;
  }
  .wf-nav--overlay { position:absolute; top:0; left:0; right:0; }
  .wf-nav__logo { display:flex; align-items:center; gap:12px; }
  .wf-logo-mark { width:30px; height:30px; background:var(--blood); border-radius:3px;
    clip-path:polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%); }
  .wf-logo-txt { font-family:var(--mono); font-weight:700; letter-spacing:3px; font-size:15px; }
  .wf-nav__links { display:flex; gap:30px; font-family:var(--mono); font-size:12px;
    letter-spacing:1.5px; color:var(--muted); }
  .wf-nav__right { display:flex; align-items:center; gap:22px; font-family:var(--mono); font-size:12px; letter-spacing:1.5px; }
  .wf-nav__region { color:var(--muted); }
  .wf-nav__cta { color:var(--blood); font-weight:700; }

  /* ===== HERO (shared) ===== */
  .wf-hero { position:relative; overflow:hidden; flex:none; }
  .wf-hero__media .wf-slot__tag { font-size:12px; }
  .wf-hero__scrim { position:absolute; inset:0; pointer-events:none; }
  .wf-hero__scrim--bl { background:linear-gradient(70deg,
      rgba(7,8,9,calc(var(--scrim) + .2)) 0%, rgba(7,8,9,calc(var(--scrim) - .1)) 42%, transparent 72%),
      linear-gradient(0deg, rgba(7,8,9,.6), transparent 45%); }
  .wf-hero__scrim--center { background:radial-gradient(120% 90% at 50% 55%,
      transparent 30%, rgba(7,8,9,var(--scrim)) 80%),
      linear-gradient(0deg, rgba(7,8,9,.45), transparent 60%); }
  .wf-hero__scrim--tl { background:linear-gradient(125deg,
      rgba(7,8,9,calc(var(--scrim) + .15)) 0%, transparent 55%),
      linear-gradient(0deg, rgba(7,8,9,.5), transparent 50%); }
  .wf-hero__content { position:absolute; z-index:4; max-width:640px; }
  .wf-hero__content--bl { left:56px; bottom:84px; }
  .wf-hero__content--center { left:50%; top:50%; transform:translate(-50%,-50%);
    text-align:center; display:flex; flex-direction:column; align-items:center; max-width:760px; }
  .wf-hero__content--tl { left:56px; top:128px; max-width:600px; }
  .wf-hero__hint { position:absolute; right:56px; bottom:40px; font-family:var(--mono);
    font-size:11px; letter-spacing:2px; color:var(--muted); z-index:4; }

  .wf-kicker { font-family:var(--mono); font-size:12px; letter-spacing:3px; color:var(--blood);
    text-transform:uppercase; margin-bottom:18px; }

  /* ===== TITLE (brush gyosho) ===== */
  .wf-title { margin:0; font-family:var(--title-font); color:var(--blood); line-height:.92;
    font-weight:400; display:flex; flex-wrap:wrap; align-items:baseline; gap:0 18px;
    text-shadow:0 2px 30px color-mix(in oklab, var(--blood) 45%, transparent); }
  .wf-title--center { justify-content:center; }
  .wf-title__line { display:inline-block; }
  .wf-title__x { color:var(--ink); opacity:.55; font-family:var(--sans); font-weight:300; }
  .wf-title--lg { font-size:78px; } .wf-title--lg .wf-title__x { font-size:46px; }
  .wf-title--xl { font-size:96px; } .wf-title--xl .wf-title__x { font-size:54px; }
  .wf-title--md { font-size:62px; } .wf-title--md .wf-title__x { font-size:38px; }
  .wf-title__line--big { width:100%; }

  .wf-sub { font-size:18px; line-height:1.5; color:var(--ink); opacity:.82; max-width:480px;
    margin:22px 0 28px; }
  .wf-sub--center { margin-left:auto; margin-right:auto; }

  /* ===== BUTTONS ===== */
  .wf-cta-row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .wf-cta-row--center { justify-content:center; }
  .wf-btn { display:inline-flex; align-items:center; gap:10px; font-family:var(--mono);
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
    border-radius:3px; border:1.5px solid transparent; font-size:13px; padding:15px 26px; }
  .wf-btn--big { padding:18px 34px; font-size:14px; }
  .wf-btn--primary { background:var(--blood); color:var(--blood-ink); border-color:var(--blood);
    box-shadow:0 6px 24px color-mix(in oklab, var(--blood) 40%, transparent); }
  .wf-btn--ghost { background:rgba(255,255,255,.04); color:var(--ink); border-color:var(--line2);
    backdrop-filter:blur(4px); }
  .wf-btn--full { width:100%; justify-content:center; }

  /* ===== HERO B — HUD frame + trailer circle ===== */
  .wf-hud-frame { position:absolute; inset:40px; z-index:3; pointer-events:none; }
  .wf-hud-c { position:absolute; width:34px; height:34px; border:2px solid color-mix(in oklab, var(--blood) 70%, transparent); }
  .wf-hud-c--tl { top:0; left:0; border-right:0; border-bottom:0; }
  .wf-hud-c--tr { top:0; right:0; border-left:0; border-bottom:0; }
  .wf-hud-c--bl { bottom:0; left:0; border-right:0; border-top:0; }
  .wf-hud-c--br { bottom:0; right:0; border-left:0; border-top:0; }
  .wf-trailer-circle { width:96px; height:96px; border-radius:50%; border:1.5px solid var(--line2);
    background:rgba(255,255,255,.05); color:var(--ink); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px; cursor:pointer; margin-bottom:26px;
    font-family:var(--mono); font-size:9px; letter-spacing:1.5px; backdrop-filter:blur(4px); }
  .wf-trailer-circle svg { color:var(--blood); }

  /* ===== HERO C — stacked CTA boxes + HUD stats ===== */
  .wf-cta-stack { display:flex; flex-direction:column; gap:14px; margin-top:30px; max-width:340px; }
  .wf-cta-box { display:flex; align-items:center; gap:16px; padding:16px 22px; cursor:pointer;
    border-radius:3px; text-align:left; font-family:var(--sans); }
  .wf-cta-box--primary { background:var(--blood); color:#fff; border:1.5px solid var(--blood);
    box-shadow:0 6px 24px color-mix(in oklab, var(--blood) 40%, transparent); }
  .wf-cta-box--ghost { background:rgba(255,255,255,.04); border:1.5px solid var(--line2); color:var(--ink); }
  .wf-cta-box svg { flex:none; }
  .wf-cta-box__txt { display:flex; flex-direction:column; gap:2px; }
  .wf-cta-box__lg { font-family:var(--mono); font-weight:700; letter-spacing:1.5px; font-size:14px; }
  .wf-cta-box__sm { font-size:11px; opacity:.7; letter-spacing:.5px; }
  .wf-hud-stats { position:absolute; left:56px; right:56px; bottom:40px; z-index:4;
    display:flex; gap:48px; border-top:1px solid var(--line); padding-top:18px; }
  .wf-stat { display:flex; flex-direction:column; gap:4px; }
  .wf-stat__k { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--muted); }
  .wf-stat__v { font-family:var(--mono); font-size:22px; font-weight:700; color:var(--ink); }

  /* ===== SECTIONS SHARED ===== */
  .wf-h2 { font-family:var(--sans); font-weight:800; font-size:38px; margin:0; letter-spacing:-.5px; }
  .wf-h3 { font-family:var(--sans); font-weight:700; font-size:24px; margin:14px 0 14px; letter-spacing:-.3px; }
  .wf-card__num, .wf-band__num { font-family:var(--mono); font-size:13px; color:var(--blood); font-weight:700; letter-spacing:2px; }

  /* FEATURES — split (A) */
  .wf-feat { padding:80px 56px; flex:none; border-top:1px solid var(--line); }
  .wf-feat__head { margin-bottom:40px; }
  .wf-feat__head--center { text-align:center; }
  .wf-feat--split .wf-feat__grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
  .wf-card { background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:22px; }

  /* FEATURES — alternating (B) */
  .wf-altrow { display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center;
    padding:34px 0; }
  .wf-altrow--rev .wf-altrow__media { order:2; }
  .wf-altrow__body { display:flex; flex-direction:column; }
  .wf-readmore { font-family:var(--mono); font-size:12px; letter-spacing:1.5px; color:var(--blood); font-weight:700; }
  .wf-readmore--sm { margin-top:14px; }

  /* FEATURES — bands (C) */
  .wf-band { display:flex; align-items:center; gap:40px; background:var(--panel);
    border:1px solid var(--line); border-radius:4px; padding:30px 36px; margin-bottom:20px; }
  .wf-band__body { flex:1; }

  /* NEWS — horizontal rows */
  .wf-news { padding:80px 56px; flex:none; border-top:1px solid var(--line); }
  .wf-news__head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:34px; }
  .wf-news__list { display:flex; flex-direction:column; }
  .wf-news-row { display:grid; grid-template-columns:130px 120px 1fr 30px; gap:28px; align-items:center;
    padding:22px 4px; border-top:1px solid var(--line); }
  .wf-news-row:last-child { border-bottom:1px solid var(--line); }
  .wf-news-row__date { display:flex; flex-direction:column; gap:6px; }
  .wf-news-row__tag { font-family:var(--mono); font-size:10px; letter-spacing:1.5px; color:var(--blood);
    border:1px solid color-mix(in oklab, var(--blood) 50%, transparent); padding:2px 7px; border-radius:2px; align-self:flex-start; }
  .wf-news-row__d { font-family:var(--mono); font-size:13px; color:var(--muted); }
  .wf-news-row__title { font-size:19px; font-weight:700; margin-bottom:10px; letter-spacing:-.2px; }
  .wf-news-row__arrow { font-size:20px; color:var(--blood); text-align:center; }

  /* MEGA CTA */
  .wf-mega { padding:90px 56px; flex:none; text-align:center; border-top:1px solid var(--line);
    background:var(--panel); }
  .wf-mega--stripes { background:
      repeating-linear-gradient(135deg, #131518 0 16px, #0f1114 16px 32px); }
  .wf-mega__inner { max-width:760px; margin:0 auto; }
  .wf-mega__title { font-family:var(--title-font); color:var(--ink); font-size:56px; line-height:1.05;
    margin:8px 0 24px; }
  .wf-mega__btns { display:flex; gap:16px; justify-content:center; margin-top:28px; }

  /* FOOTER */
  .wf-footer { margin-top:auto; flex:none; background:#08090a; border-top:1px solid var(--line);
    padding:52px 56px 0; }
  .wf-footer__top { display:flex; justify-content:space-between; gap:60px; padding-bottom:44px; }
  .wf-footer__brand { display:flex; flex-direction:column; gap:10px; }
  .wf-footer__brand .wf-logo-mark { width:36px; height:36px; }
  .wf-footer__tag { font-family:var(--mono); font-size:11px; color:var(--muted2); margin:6px 0 0; }
  .wf-footer__cols { display:flex; gap:64px; }
  .wf-footer__col { display:flex; flex-direction:column; gap:12px; }
  .wf-footer__h { font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--muted); margin-bottom:4px; }
  .wf-footer__link { font-size:14px; color:var(--ink); opacity:.7; }
  .wf-footer__bar { display:flex; justify-content:space-between; padding:22px 0; border-top:1px solid var(--line);
    font-family:var(--mono); font-size:11px; letter-spacing:1px; color:var(--muted2); }

  /* per-direction fixed section heights so artboards fit exactly */
  .wf-A .wf-hero { height:820px; } .wf-A .wf-feat { height:600px; }
  .wf-B .wf-hero { height:820px; } .wf-B .wf-feat { height:920px; }
  .wf-C .wf-hero { height:900px; } .wf-C .wf-feat { height:600px; }
  .wf-page .wf-news { height:540px; }
  .wf-page .wf-mega { height:380px; }
  .wf-page .wf-footer { height:300px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-shared.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
<script type="text/babel" src="direction-c.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#e23b2e",
    "titleFont": "Serif (Mincho)",
    "annotations": true,
    "heroScrim": 51
  }/*EDITMODE-END*/;

  const FONT_MAP = {
    "Brush (Gyōsho)": '"Yuji Mai", serif',
    "Serif (Mincho)": '"Shippori Mincho", serif',
  };

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    React.useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty("--blood", t.accent);
      r.style.setProperty("--title-font", FONT_MAP[t.titleFont] || FONT_MAP["Brush (Gyōsho)"]);
      r.style.setProperty("--scrim", (t.heroScrim / 100).toFixed(2));
      document.querySelectorAll(".wf-page").forEach((el) =>
        el.classList.toggle("wf-no-annot", !t.annotations));
    }, [t]);

    return (
      <React.Fragment>
        <DesignCanvas>
          <DCSection id="cyberpunk" title="Cyberpunk Game — Landing Page"
                     subtitle="3 directions · mid-fi · dark greyscale + blood red">
            <DCArtboard id="A" label="A · Bottom-Left Anchor" width={1440} height={2640}>
              <div className="wf-page wf-A"><DirectionA /></div>
            </DCArtboard>
            <DCArtboard id="B" label="B · Centered Cinematic" width={1440} height={2960}>
              <div className="wf-page wf-B"><DirectionB /></div>
            </DCArtboard>
            <DCArtboard id="C" label="C · Top-Left HUD" width={1440} height={2720}>
              <div className="wf-page wf-C"><DirectionC /></div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel>
          <TweakSection label="Brand" />
          <TweakColor label="Blood red accent" value={t.accent}
            options={["#c5151c", "#8b0000", "#e23b2e", "#a30b2e"]}
            onChange={(v) => setTweak("accent", v)} />
          <TweakRadio label="Title font" value={t.titleFont}
            options={["Brush (Gyōsho)", "Serif (Mincho)"]}
            onChange={(v) => setTweak("titleFont", v)} />
          <TweakSection label="Hero" />
          <TweakSlider label="Video overlay" value={t.heroScrim} min={20} max={80} unit="%"
            onChange={(v) => setTweak("heroScrim", v)} />
          <TweakSection label="Wireframe" />
          <TweakToggle label="Show annotations" value={t.annotations}
            onChange={(v) => setTweak("annotations", v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
